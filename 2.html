<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object Properties</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .output-box {
            background-color: #f4f4f9;
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            white-space: pre-wrap;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <h2>JavaScript Object Manipulation</h2>

    <h3>1. All properties of the original object:</h3>
    <div id="original-output" class="output-box"></div>

    <h3>2. Object after deleting the 'age' property:</h3>
    <div id="modified-output" class="output-box"></div>

    <script>
        // Sample object
        var Person = {
            firstName: "Tony",
            lastName: "Lee",
            age: 50,
            eyeColor: "Blue"
        };

        // Get the output containers
        var originalOutput = document.getElementById("original-output");
        var modifiedOutput = document.getElementById("modified-output");

        // 1. List all properties of the original object
        var originalProps = "";
        for (var key in Person) {
            originalProps += key + " : " + Person[key] + "\n";
        }
        originalOutput.textContent = originalProps;

        // 2. Delete the age property from the object
        delete Person.age;

        // 3. Print the object after deleting the property
        var modifiedProps = "";
        for (var key in Person) {
            modifiedProps += key + " : " + Person[key] + "\n";
        }
        modifiedOutput.textContent = modifiedProps;
        
        // Alternatively, you can print the raw object using JSON.stringify
        // modifiedOutput.textContent = JSON.stringify(Person, null, 4);
    </script>

</body>
</html>
